name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check app.js and lib
        run: |
          node --check app.js
          for f in lib/*.mjs tests/*.mjs; do node --check "$f"; done

      - name: Unit tests
        run: node --test --test-reporter=spec tests/*.test.mjs

      - name: HTML sanity — required data-role targets exist
        run: node scripts/check-html.mjs

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject runtime config from secrets
        env:
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          cat > config.js <<EOF
          // Generated at deploy time from repository secrets. Do not commit.
          export const UPSTASH_REDIS_REST_URL   = '${UPSTASH_REDIS_REST_URL}'
          export const UPSTASH_REDIS_REST_TOKEN = '${UPSTASH_REDIS_REST_TOKEN}'
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
